<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Берік Ғалымұлы - 60 жас</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/scrollreveal"></script>
    
    <style>
        @font-face {
            font-family: 'Cassandra';
            src: url('11 Cassandra.ttf') format('truetype');
        }
        
        :root {
            --bg-color: #f5f5ef;
            --accent: #719279;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            background-color: var(--bg-color); 
            font-family: 'Montserrat', sans-serif; 
            overflow-x: hidden;
        }

        /* Кнопка музыки */
        .music-control {
            position: fixed;
            bottom: 25px;
            right: 25px;
            z-index: 100;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            cursor: pointer;
            background: white url('music-icon.png') center/60% no-repeat;
            border: 3px solid var(--accent);
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .playing { animation: spin 4s linear infinite; }

        /* ГЛАВНЫЙ ЭКРАН */
        .hero {
            height: 100vh;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center; /* Центровка контейнера с текстом */
            background-color: var(--bg-color);
            overflow: hidden;
        }

        .hero-bg-text {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 1;
            margin-top: -15vh; /* ПОДНИМАЕМ ТЕКСТ ВЫШЕ */
        }

        .num-60 {
            font-family: 'Cassandra', serif !important;
            font-size: 50vw; 
            font-weight: 900;
            color: var(--accent);
            line-height: 0.8;
        }

        .word-zhas {
            font-family: 'Cassandra', serif !important;
            font-size: 15vw;
            color: var(--accent);
            text-transform: uppercase;
            margin-top: -2vw;
        }

        .hero-photo-container {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 70vh; /* УМЕНЬШИЛИ ВЫСОТУ ФОТО */
            z-index: 2;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            margin-bottom: -2vh; /* ОПУСТИЛИ МУЖЧИНУ НИЖЕ */
        }

        .hero-photo {
            height: 100%;
            width: auto;
            object-fit: contain;
            -webkit-mask-image: linear-gradient(to bottom, black 85%, transparent 100%);
            mask-image: linear-gradient(to bottom, black 85%, transparent 100%);
        }

        /* Контентная часть */
        .section {
            padding: 60px 20px;
            text-align: center;
            max-width: 800px;
            margin: 0 auto;
        }
        .title-main { font-family: 'Cassandra', serif !important; font-size: 2.5rem; color: var(--accent); margin-bottom: 20px; }
        .info-grid { font-family: 'Cassandra', serif !important; font-size: 2rem; line-height: 1.4; margin: 40px 0; text-align: left; display: inline-block; }
        .btn-map { display: inline-block; padding: 15px 35px; background: var(--accent); color: white; text-decoration: none; border-radius: 50px; font-weight: bold; }
        
        .form-container { background: white; padding: 40px 20px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); margin-top: 50px; }
        input, select { width: 100%; padding: 15px; margin: 10px 0 20px; border: 1px solid #eee; border-radius: 5px; }
        .submit-btn { width: 100%; padding: 20px; background: var(--accent); color: white; border: none; font-weight: bold; border-radius: 5px; cursor: pointer; }

        @media (max-width: 600px) {
            .num-60 { font-size: 65vw; }
            .word-zhas { font-size: 22vw; }
            .hero-bg-text { margin-top: -20vh; }
            .hero-photo-container { height: 65vh; }
        }
        .reveal { visibility: hidden; }
    </style>
</head>
<body>

    <div class="music-control" id="musicBtn"></div>
    <audio id="myAudio" loop><source src="musica.mp3" type="audio/mpeg"></audio>

    <section class="hero">
        <div class="hero-bg-text">
            <span class="num-60">60</span>
            <span class="word-zhas">ЖАС</span>
        </div>
        <div class="hero-photo-container">
            <img src="Gemini_Generated_Image_qibkb5qibkb5qibk-Photoroom.png" alt="Берік Ғалымұлы" class="hero-photo">
        </div>
    </section>

    <section class="section">
        <h1 class="title-main reveal">Берік Ғалымұлының мерейтойы</h1>
        <p class="reveal">Сіздерді 60 жасқа толу тойына арналған ақ дастарханымыздың құрметті қонағы болуға шақырамыз.</p>
        
        <img src="Gemini_Generated_Image_l3cl6gl3cl6gl3cl.png" alt="Бәйтерек" style="width:100%; border-radius:10px; margin: 30px 0;" class="reveal">

        <div class="info-grid reveal">
            <div><b>Той орны:</b> “Бәйтерек” банкет залы</div>
            <div><b>Адресі:</b> Б.Момышұлы-2/4</div>
            <div><b>Уақыты:</b> 2-шілде 2026-жыл, 17:00</div>
        </div>

        <br>
        <a href="https://2gis.kz/astana/firm/70000001083013833" target="_blank" class="btn-map reveal">КАРТАДАН ҚАРАУ</a>

        <div class="form-container reveal">
            <h2>Сауалнама</h2>
            <form id="invite-form">
                <input type="text" name="аты" required placeholder="Атыңыз">
                <input type="text" name="тегі" required placeholder="Тегіңіз">
                <select name="жауап" id="attendance" required>
                    <option value="" disabled selected>Келесіз бе?</option>
                    <option value="Иә, келемін">Иә, келемін</option>
                    <option value="Жоқ, келе алмаймын">Жоқ, келе алмаймын</option>
                </select>
                <button type="submit" class="submit-btn" id="submitBtn">Жіберу</button>
            </form>
            <div id="msg" style="display:none; text-align:center; margin-top:20px; color: var(--accent); font-weight: bold;">Жауабыңыз қабылданды!</div>
        </div>
    </section>

    <script>
        ScrollReveal().reveal('.reveal', { delay: 200, distance: '30px', origin: 'bottom', interval: 100 });

        const audio = document.getElementById('myAudio');
        const musicBtn = document.getElementById('musicBtn');
        musicBtn.addEventListener('click', () => {
            if (audio.paused) { audio.play(); musicBtn.classList.add('playing'); }
            else { audio.pause(); musicBtn.classList.remove('playing'); }
        });

        const scriptURL = 'https://script.google.com/macros/s/AKfycbz0DbovH6IbFgXu2BT0epxZJpfiJweCpEIKmCt_zJDdSAT87UilXERWlUftvponc_PMKQ/exec';
        const form = document.getElementById('invite-form');
        form.addEventListener('submit', e => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.innerText = 'Жіберілуде...';
            fetch(scriptURL, { method: 'POST', body: new FormData(form)})
                .then(() => {
                    form.style.display = 'none';
                    document.getElementById('msg').style.display = 'block';
                })
                .catch(() => {
                    alert('Қате кетті!');
                    btn.disabled = false;
                });
        });
    </script>
</body>
</html>
