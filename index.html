<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Берік Ғалымұлы - 60 жас</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/scrollreveal"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/parallax/3.1.0/parallax.min.js"></script>
    
    <style>
        @font-face {
            font-family: 'Cassandra';
            src: url('11 Cassandra.ttf') format('truetype');
        }
        
        :root {
            --bg-color: #f5f5ef;
            --accent: #719279;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            background-color: var(--bg-color); 
            font-family: 'Montserrat', sans-serif; 
            overflow-x: hidden;
        }

        /* --- Плеер --- */
        .music-control {
            position: fixed;
            bottom: 25px;
            right: 25px;
            z-index: 1000;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            cursor: pointer;
            background: white url('music-icon.png') center/60% no-repeat;
            border: 3px solid var(--accent);
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .playing { animation: spin 4s linear infinite; }

        /* --- ГЛАВНЫЙ ЭКРАН (Исправленный параллакс) --- */
        #hero-scene {
            position: relative;
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            background-color: var(--bg-color);
        }

        .layer {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Слово ЖАС (Фон) */
        .word-zhas {
            font-family: 'Cassandra', serif;
            font-size: 85vw;
            color: var(--accent);
            opacity: 0.12;
            text-transform: uppercase;
            line-height: 1;
            pointer-events: none;
        }

        /* Число 60 (Центр) */
        .num-60 {
            font-family: 'Cassandra', serif;
            font-size: 45vw;
            color: var(--accent);
            font-weight: 900;
            pointer-events: none;
            z-index: 5;
        }

        /* Фото мужчины */
        .photo-layer {
            align-items: flex-end; /* Прижимаем к низу */
        }

        .hero-photo {
            height: 75vh;
            width: auto;
            object-fit: contain;
            z-index: 10;
            pointer-events: none;
            /* Плавное исчезновение снизу */
            -webkit-mask-image: linear-gradient(to bottom, black 80%, transparent 100%);
            mask-image: linear-gradient(to bottom, black 80%, transparent 100%);
        }

        /* Орнаменты */
        .ornament {
            position: absolute;
            width: 25vw;
            opacity: 0.2;
            pointer-events: none;
        }

        /* --- Секция контента --- */
        .section {
            padding: 80px 20px;
            text-align: center;
            background: var(--bg-color);
            position: relative;
            z-index: 20;
        }

        .title-main { font-family: 'Cassandra', serif; font-size: 2.5rem; color: var(--accent); margin-bottom: 20px; }
        
        .info-grid {
            text-align: left;
            margin: 30px auto;
            display: inline-block;
            font-family: 'Cassandra', serif;
            font-size: 2rem;
        }

        .btn-map { 
            display: inline-block; padding: 15px 30px; background: var(--accent); 
            color: white; text-decoration: none; border-radius: 50px; font-weight: bold;
        }

        .form-container { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 5px 20px rgba(0,0,0,0.05); margin-top: 40px; }
        input, select { width: 100%; padding: 15px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; }
        .submit-btn { width: 100%; padding: 15px; background: var(--accent); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }

        @media (max-width: 600px) {
            .num-60 { font-size: 60vw; }
            .word-zhas { font-size: 110vw; }
            .hero-photo { height: 70vh; }
        }
    </style>
</head>
<body>

    <div class="music-control" id="musicBtn"></div>
    <audio id="myAudio" loop><source src="musica.mp3" type="audio/mpeg"></audio>

    <div id="hero-scene">
        <div class="layer" data-depth="0.1">
            <h2 class="word-zhas">ЖАС</h2>
        </div>

        <div class="layer" data-depth="0.4">
            <img src="ornament.png" class="ornament" style="top: 10%; left: 5%;" alt="">
            <img src="ornament.png" class="ornament" style="bottom: 15%; right: 5%; transform: rotate(180deg);" alt="">
        </div>

        <div class="layer" data-depth="0.2">
            <h1 class="num-60">60</h1>
        </div>

        <div class="layer photo-layer" data-depth="0.15">
            <img src="Gemini_Generated_Image_qibkb5qibkb5qibk-Photoroom.png" class="hero-photo" alt="">
        </div>
    </div>

    <section class="section">
        <h1 class="title-main">Асқар таудай әкеміз - Берік Ғалымұлының</h1>
        <p>мерейлі 60 жасқа толу тойына арналған ақ дастарханымыздың құрметті қонағы болуға шақырамыз.</p>
        
        <div class="info-grid">
            <p><b>Той иелері:</b> жары мен балалары</p>
            <p><b>Той орны:</b> “Бәйтерек” банкет залы</p>
            <p><b>Уақыты:</b> 2-шілде 2026-жыл, 17:00</p>
        </div>
        <br>
        <a href="https://2gis.kz/astana/firm/70000001083013833" class="btn-map">КАРТАДАН ҚАРАУ</a>

        <div class="form-container">
            <h2>Сауалнама</h2>
            <form id="invite-form">
                <input type="text" name="аты" required placeholder="Атыңыз">
                <input type="text" name="тегі" required placeholder="Тегіңіз">
                <select name="жауап" id="attendance" required>
                    <option value="" disabled selected>Келесіз бе?</option>
                    <option value="Иә, келемін">Иә, келемін</option>
                    <option value="Жоқ, келе алмаймын">Жоқ, келе алмаймын</option>
                </select>
                <div id="extra" style="display:none">
                    <select name="кіммен">
                        <option value="Жалғыз">Жалғыз келемін</option>
                        <option value="Жұбыммен">Жұбыммен келемін</option>
                    </select>
                </div>
                <button type="submit" class="submit-btn" id="submitBtn">Жіберу</button>
            </form>
            <p id="msg" style="display:none; color: var(--accent); margin-top:20px;">Рахмет! Жауап қабылданды.</p>
        </div>
    </section>

    <script>
        // Запуск параллакса
        var scene = document.getElementById('hero-scene');
        var parallaxInstance = new Parallax(scene);

        // Музыка
        const audio = document.getElementById('myAudio');
        const btn = document.getElementById('musicBtn');
        btn.addEventListener('click', () => {
            if (audio.paused) { audio.play(); btn.classList.add('playing'); }
            else { audio.pause(); btn.classList.remove('playing'); }
        });

        // Анкета
        document.getElementById('attendance').onchange = function() {
            document.getElementById('extra').style.display = this.value === 'Иә, келемін' ? 'block' : 'none';
        };

        const scriptURL = 'https://script.google.com/macros/s/AKfycbz0DbovH6IbFgXu2BT0epxZJpfiJweCpEIKmCt_zJDdSAT87UilXERWlUftvponc_PMKQ/exec';
        const form = document.getElementById('invite-form');
        form.onsubmit = e => {
            e.preventDefault();
            document.getElementById('submitBtn').disabled = true;
            fetch(scriptURL, { method: 'POST', body: new FormData(form)})
            .then(() => { form.style.display = 'none'; document.getElementById('msg').style.display = 'block'; });
        };
    </script>
</body>
</html>
