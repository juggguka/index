<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Берік Ғалымұлы - 60 жас</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/parallax/3.1.0/parallax.min.js"></script>
    
    <style>
        @font-face {
            font-family: 'Cassandra';
            src: url('11 Cassandra.ttf') format('truetype');
        }
        
        :root {
            --bg-color: #f5f5ef;
            --accent: #719279;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            background-color: var(--bg-color); 
            font-family: 'Montserrat', sans-serif; 
            overflow-x: hidden;
            color: #2c2c2c;
        }

        /* --- Кнопка музыки --- */
        .music-control {
            position: fixed;
            bottom: 25px;
            right: 25px;
            z-index: 1000;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            cursor: pointer;
            background: white url('music-icon.png') center/60% no-repeat;
            border: 3px solid var(--accent);
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .playing { animation: spin 4s linear infinite; }

        /* --- ГЛАВНЫЙ ЭКРАН (HERO) --- */
        .hero-wrapper {
            position: relative;
            width: 100%;
            height: 100vh;
            overflow: hidden;
            background-color: var(--bg-color);
        }

        #scene {
            width: 100%;
            height: 100%;
            position: relative;
        }

        .layer {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
        }

        /* Слово ЖАС (Фон на ширину страницы) */
        .word-zhas {
            font-family: 'Cassandra', serif;
            font-size: 90vw; 
            color: var(--accent);
            opacity: 0.12;
            text-transform: uppercase;
            margin-top: 12vh;
            pointer-events: none;
            letter-spacing: 1vw;
            white-space: nowrap;
        }

        /* Число 60 (Высоко по центру) */
        .num-60 {
            font-family: 'Cassandra', serif;
            font-size: 45vw;
            color: var(--accent);
            font-weight: 900;
            margin-top: 5vh; 
            pointer-events: none;
            z-index: 2;
        }

        /* Орнаменты */
        .ornament {
            position: absolute;
            width: 22vw;
            opacity: 0.2;
            pointer-events: none;
        }

        /* Фото мужчины (Прижато к низу) */
        .photo-layer {
            align-items: flex-end;
            z-index: 10;
        }

        .hero-photo {
            height: 80vh;
            width: auto;
            object-fit: contain;
            pointer-events: none;
            -webkit-mask-image: linear-gradient(to bottom, black 85%, transparent 100%);
            mask-image: linear-gradient(to bottom, black 85%, transparent 100%);
        }

        /* --- ИНФО СЕКЦИЯ --- */
        .section {
            padding: 80px 20px;
            text-align: center;
            background: var(--bg-color);
            position: relative;
            z-index: 20;
        }

        .title-main { font-family: 'Cassandra', serif; font-size: 2.5rem; color: var(--accent); margin-bottom: 25px; }
        
        .restaurant-img {
            width: 100%;
            max-width: 650px;
            border-radius: 15px;
            margin: 30px 0;
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
        }

        .info-grid {
            font-family: 'Cassandra', serif;
            font-size: 2.2rem;
            line-height: 1.4;
            margin: 30px 0;
        }

        .btn-map { 
            display: inline-block; 
            padding: 16px 35px; 
            background: var(--accent); 
            color: white; 
            text-decoration: none; 
            border-radius: 50px; 
            font-weight: bold;
            margin-bottom: 40px;
        }

        /* --- Адаптация для мобильных --- */
        @media (max-width: 600px) {
            .num-60 { font-size: 55vw; margin-top: 10vh; }
            .word-zhas { font-size: 94vw; margin-top: 20vh; }
            .hero-photo { height: 75vh; }
            .title-main { font-size: 1.8rem; }
            .info-grid { font-size: 1.6rem; }
        }
    </style>
</head>
<body>

    <div class="music-control" id="musicBtn"></div>
    <audio id="myAudio" loop><source src="musica.mp3" type="audio/mpeg"></audio>

    <div class="hero-wrapper">
        <div id="scene">
            <!-- Слой 1: ЖАС (Дальний фон) -->
            <div class="layer" data-depth="0.1">
                <h2 class="word-zhas">ЖАС</h2>
            </div>

            <!-- Слой 2: Орнаменты -->
            <div class="layer" data-depth="0.4">
                <img src="ornament.png" class="ornament" style="top: 15%; left: 8%;" alt="">
                <img src="ornament.png" class="ornament" style="top: 35%; right: 8%; transform: rotate(15deg);" alt="">
            </div>

            <!-- Слой 3: 60 (Средний план) -->
            <div class="layer" data-depth="0.25">
                <h1 class="num-60">60</h1>
            </div>

            <!-- Слой 4: Фото (Ближний план) -->
            <div class="layer photo-layer" data-depth="0.15">
                <img src="Gemini_Generated_Image_qibkb5qibkb5qibk-Photoroom.png" class="hero-photo" alt="Берік Ғалымұлы">
            </div>
        </div>
    </div>

    <section class="section">
        <h1 class="title-main">Асқар таудай әкеміз - Берік Ғалымұлының</h1>
        <p>мерейлі 60 жасқа толу тойына арналған ақ дастарханымыздың құрметті қонағы болуға шақырамыз.</p>
        
        <img src="Gemini_Generated_Image_l3cl6gl3cl6gl3cl.png" class="restaurant-img" alt="Бәйтерек рестораны">

        <div class="info-grid">
            <p><b>Той орны:</b> “Бәйтерек” банкет залы</p>
            <p><b>Адресі:</b> Б.Момышұлы-2/4</p>
            <p><b>Уақыты:</b> 2-шілде 2026-жыл, 17:00</p>
        </div>

        <a href="https://2gis.kz/astana/firm/70000001083013833" class="btn-map">КАРТАДАН ҚАРАУ</a>

        <!-- Форма здесь (если нужна) -->
    </section>

    <script>
        // Инициализация параллакса
        var scene = document.getElementById('scene');
        var parallaxInstance = new Parallax(scene, {
            relativeInput: true,
            hoverOnly: false
        });

        // Управление музыкой
        const audio = document.getElementById('myAudio');
        const btn = document.getElementById('musicBtn');
        btn.addEventListener('click', () => {
            if (audio.paused) { 
                audio.play(); 
                btn.classList.add('playing'); 
            } else { 
                audio.pause(); 
                btn.classList.remove('playing'); 
            }
        });
    </script>
</body>
</html>
